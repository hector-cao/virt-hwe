// Install this file in /etc/apt/apt.conf.d/99-qemu-install-list-hook
// and ensure /usr/local/sbin/apt_hook_ubuntu_virt.sh is executable.
//
// Behavior:
// - Pre hook inspects planned qemu package installs
// - If switching base<->hwe variant, missing counterparts are queued
// - Post hook performs a follow-up apt-get install for queued counterparts
//
// Optional environment variables (can be set in root shell/session):
//   APT_QEMU_PENDING_FILE=/tmp/apt-qemu-counterparts.pending
//   APT_QEMU_AUTOFIX_LOG=/tmp/apt-qemu-counterparts.log

DPkg::Pre-Install-Pkgs {
  "/usr/local/sbin/apt_hook_ubuntu_virt.sh --pre";
};

DPkg::Post-Invoke {
  "/usr/local/sbin/apt_hook_ubuntu_virt.sh --post";
};
